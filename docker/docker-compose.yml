# Issue #3 — MinIO | Issue #7 — PostgreSQL origem
# https://github.com/Theordep/projeto-ed-final/issues/3
# https://github.com/Theordep/projeto-ed-final/issues/7

# Configuração compartilhada entre todos os serviços Airflow
x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: docker/Dockerfile.airflow
  environment:
    # --- Airflow core ---
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    # Usa o superusuário sparkeats — elimina a necessidade de criar user 'airflow' separado
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://sparkeats:sparkeats_dev@postgres/airflow
    # Gere uma chave própria com: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-sparkeats-webserver-secret-dev}
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    # --- Pipeline SparkEats (endereços internos do Docker) ---
    POSTGRES_HOST: postgres
    POSTGRES_PORT: '5432'
    POSTGRES_USER: ${POSTGRES_USER:-sparkeats}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sparkeats_dev}
    POSTGRES_DB: ${POSTGRES_DB:-sparkeats}
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    DATA_ROOT: /data/sparkeats
    SPARK_MASTER: local[*]
    SPARK_DRIVER_MEMORY: 2g
    SPARK_LOCAL_DIRS: /tmp/spark-local
    SPARK_WAREHOUSE: /tmp/spark-warehouse
    PYTHONPATH: /opt/airflow/src
  volumes:
    - ../dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
    - sparkeats_data:/data/sparkeats
    - ../src:/opt/airflow/src
    - ivy2_cache:/home/airflow/.ivy2
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — banco de origem OLTP do SparkEats + metadados do Airflow
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: projeto-ed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sparkeats}
      POSTGRES_USER: ${POSTGRES_USER:-sparkeats}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sparkeats_dev}
    # Host 5433 evita conflito com Postgres do Windows (5432)
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Cria banco "airflow" e usuário "airflow" no primeiro init
      - ./postgres/init-airflow.sql:/docker-entrypoint-initdb.d/01-airflow.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sparkeats -d sparkeats"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # MinIO — object storage S3-compatível (Landing, Bronze, Silver, Gold)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    container_name: projeto-ed-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    # Host 9090/9091 evita conflito com outro MinIO no Windows (9000/9001)
    ports:
      - "9090:9000"
      - "9091:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    container_name: projeto-ed-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command: >
      -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb -p local/landing-zone 2>/dev/null || true &&
      mc mb -p local/bronze 2>/dev/null || true &&
      mc mb -p local/silver 2>/dev/null || true &&
      mc mb -p local/gold 2>/dev/null || true &&
      echo '--- Buckets medalhao ---' &&
      mc ls local
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}

  # ---------------------------------------------------------------------------
  # Apache Spark — cluster distribuído (Master + Worker)
  # Imagem oficial Apache Foundation — gratuita (bitnami/spark foi descontinuado)
  # Versão alinhada com pyspark==3.5.1 do pyproject.toml
  # ---------------------------------------------------------------------------
  spark-master:
    image: apache/spark:3.5.1
    container_name: projeto-ed-spark-master
    restart: unless-stopped
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: "7077"
      SPARK_MASTER_WEBUI_PORT: "8080"
    ports:
      - "7077:7077"
      - "8080:8080"

  spark-worker:
    image: apache/spark:3.5.1
    container_name: projeto-ed-spark-worker
    restart: unless-stopped
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_WEBUI_PORT: "8081"
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: "2"
    ports:
      - "8081:8081"

  # ---------------------------------------------------------------------------
  # Apache Airflow — orquestrador do pipeline medalhão
  # Porta 8082 (evita conflito com Spark Master UI em 8080)
  # ---------------------------------------------------------------------------

  # Cria o banco 'airflow' antes do Airflow iniciar.
  # Usa variáveis de ambiente PG para evitar quoting complexo no comando.
  postgres-airflow-setup:
    image: postgres:16-alpine
    container_name: projeto-ed-postgres-airflow-setup
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: sparkeats
      PGPASSWORD: sparkeats_dev
      PGDATABASE: sparkeats
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        psql -c "CREATE DATABASE airflow OWNER sparkeats;" && echo "Banco airflow criado." || echo "Banco airflow ja existe."

  airflow-init:
    <<: *airflow-common
    container_name: projeto-ed-airflow-init
    restart: "no"
    # 'bash' é reconhecido pelo entrypoint da imagem Airflow e executa o script diretamente
    command: bash /usr/local/bin/airflow-entrypoint.sh
    depends_on:
      postgres:
        condition: service_healthy
      postgres-airflow-setup:
        condition: service_completed_successfully

  airflow-webserver:
    <<: *airflow-common
    container_name: projeto-ed-airflow-webserver
    restart: unless-stopped
    command: webserver
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  airflow-scheduler:
    <<: *airflow-common
    container_name: projeto-ed-airflow-scheduler
    restart: unless-stopped
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  airflow_logs:
  sparkeats_data:
  ivy2_cache:
